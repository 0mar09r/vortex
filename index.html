<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>VORTEX Host</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap');
        body { background: #0f172a; color: white; font-family: 'Tajawal', sans-serif; text-align: center; }
        .header { font-size: 50px; color: #facc15; margin: 20px; text-shadow: 0 0 15px gold; }
        .timer { font-size: 80px; color: #ef4444; }
        .btn { padding: 15px 30px; font-size: 20px; background: #16a34a; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .score-board { margin: 20px auto; max-width: 400px; background: #1e293b; padding: 15px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="header">VORTEX</div>
    <div id="roomCode">كود الغرفة: ----</div>
    <h1 id="question">اضغط "بدء الساحة"</h1>
    <div class="timer" id="timeLeft">15</div>
    <div id="winner" style="font-size: 30px; color: #38bdf8;"></div>
    <div id="scores" class="score-board"></div>
    <button onclick="initGame()" class="btn">بدء الساحة</button>
    <button onclick="nextQuestion()" class="btn" style="background:#2563eb">السؤال التالي</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // اترك هذا فارغاً، سأقوم بتعبئته لاحقاً
        const firebaseConfig = { apiKey: "", databaseURL: "", projectId: "" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRoom = "";

        const questions = [
            {q: "أطول نهر في العالم؟", a: "النيل"}, {q: "أكمل: القرد في عين أمه؟", a: "غزال"},
            {q: "سورة لا تبدأ بالبسملة؟", a: "التوبة"}, {q: "أكبر كوكب؟", a: "المشتري"}
            // (سيتم إضافة البقية برمجياً)
        ];

        window.initGame = () => {
            currentRoom = Math.random().toString(36).substring(7).toUpperCase();
            document.getElementById('rc').innerText = currentRoom;
            set(ref(db, 'rooms/' + currentRoom), { qi: 0, timer: 15, buzzer: "" });
            listenToRoom();
        };

        function listenToRoom() {
            onValue(ref(db, 'rooms/' + currentRoom), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                document.getElementById('question').innerText = questions[data.qi].q;
                document.getElementById('timeLeft').innerText = data.timer;
                document.getElementById('winner').innerText = data.buzzer ? "أسرع ضغطة: " + data.buzzer : "";
            });
        }
    </script>
</body>
</html>
